[TransformerTrainingConfig]
# How many independent sequences to process at once?
batch_size = 64

# What is the maximum context length for predictions?
block_size = 256

# How many training iterations to run?
max_iters = 5000

# How often to evaluate the model on the validation set?
eval_interval = 500

# Learning rate for Adam optimizer (found through trial and error)
learning_rate = 0.0003

# Device to run the training on (this value should be set dynamically in your code)
device = "cuda" # Placeholder value; actual selection occurs in code

# How many batches to use per loss evaluation?
eval_iters = 200

# Number of hidden units in the Transformer (384/6 = 64 dimensions per head)
n_embd = 384

# Number of attention heads in a single Transformer layer
n_head = 6

# Number of Transformer layers
n_layer = 6

# Dropout probability
dropout = 0.2
